# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Run Tests

on: [push, pull_request]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Check linting
        run: |
          flake8 .
      - name: Run tests
        run: |
          pytest
      # 1. Nuevo paso para convertir el nombre de usuario a minúsculas
      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          # CORRECCIÓN: Usa ghcr.io para que coincida con el tag de abajo
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # CORRECCIÓN: Usamos la variable env.OWNER_LC que ya está en minúsculas
          tags: ghcr.io/${{ env.OWNER_LC }}/contador:latest
      
        
          
  
  
  